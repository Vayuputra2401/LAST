# Training config for ShiftFuse-V10 (nano / small / large)
#
# Architecture: SGP + DW-GCN + TLA + 4-stream late fusion + IB loss
# Variants: nano ~140K, small ~500K, large ~1.3M
# Schedule: 180 epochs cosine warmup (same as v9/experimental for fair comparison)
#
# KD (knowledge distillation):
#   Set use_kd: true and teacher_checkpoint to enable soft-label KD.
#   Train large first (no KD), then use it as teacher for small/nano.
#   teacher_variant: which ShiftFuseV10 variant the checkpoint is from.

training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0004

  # Scheduler
  scheduler: cosine_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.005
  min_lr: 0.0001

  # Duration
  epochs: 180
  batch_size: 24
  gradient_accumulation_steps: 3    # effective batch = 24 × 3 = 72

  # Regularization
  label_smoothing: 0.1
  gradient_clip: 5.0

  # Augmentation
  mixup_alpha: 0.2
  cutmix_prob: 0.0
  cutmix_alpha: 1.0

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5

  # Reproducibility
  seed: 42

  # IB loss (InfoGCN ref=0.0001; 0.001 = 0.1% of CE gradient)
  ib_loss_weight: 0.01

  # Knowledge distillation (disabled by default — enable after large is trained)
  use_kd: false
  teacher_checkpoint: ""            # path to large model best checkpoint
  teacher_variant: "large"          # variant of the teacher checkpoint
  teacher_num_classes: 60
  kd_weight: 0.5                    # balance: (1-α)·CE + α·T²·KL
  kd_temperature: 4.0               # higher T = softer targets, more class-similarity info
