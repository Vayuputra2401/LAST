# Training config for ShiftFuse-Experimental Nano
#
# Architecture: v9 nano with TemporalAttention replaced by zero-param MultiScaleTSM.
#   channels=[24,48,96], blocks=[1,1,1], stem=16, <100K params
#
# Use case: edge deployment baseline, ablation vs v9 nano and experimental small.
# Lighter schedule to match smaller model capacity (nano overfits on 180 ep with v9).

training:
  # Optimizer
  optimizer: sgd
  lr: 0.05
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0004

  # Scheduler
  scheduler: cosine_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.005
  min_lr: 0.0001

  # Duration — 120 epochs (smaller model, less capacity to exploit longer schedules)
  epochs: 120
  batch_size: 32                 # nano is cheaper; larger batch → more stable gradient
  gradient_accumulation_steps: 2 # effective batch = 32 × 2 = 64

  # Regularization
  label_smoothing: 0.0
  gradient_clip: 5.0

  # Augmentation (disabled — 4-stream late fusion + IB loss cleaner without)
  mixup_alpha: 0.0
  cutmix_prob: 0.0
  cutmix_alpha: 1.0

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5

  # Reproducibility
  seed: 42

  # IB loss weight (InfoGCN ref=0.0001; 0.001 = 0.1% of CE gradient)
  ib_loss_weight: 0.001
