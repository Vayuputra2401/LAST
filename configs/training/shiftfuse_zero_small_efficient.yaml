training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0001  # EfficientGCN-exact

  # Scheduler
  scheduler: cosine_warmup
  warmup_epochs: 10
  warmup_start_lr: 0.005
  min_lr: 0.00001  # cosine floor — 1e-5 for fine-tuning in last 50 epochs

  # Duration — 250ep: small converges faster than nano (higher capacity, earlier plateau).
  # Mixup α=0.1 delays convergence slightly; 250 is the safe ceiling.
  epochs: 250
  batch_size: 64
  gradient_accumulation_steps: 1

  # Regularization
  label_smoothing: 0.0
  gradient_clip: 1.0

  # Augmentation — mixup=0.1 validated on nano; same for small
  mixup_alpha: 0.1
  cutmix_prob: 0.0
  cutmix_alpha: 1.0

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5

  # Reproducibility
  seed: 42

  # IB loss — disabled
  ib_loss_weight: 0.0

  # TTA: spatial flip — enable for final eval
  tta_flip: false

  # Knowledge distillation — disabled by default
  use_kd: false
  teacher_checkpoint: ""
  teacher_variant: "large"
  teacher_num_classes: 60
  kd_weight: 0.5
  kd_temperature: 4.0
