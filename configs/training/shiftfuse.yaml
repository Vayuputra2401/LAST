# Training config for ShiftFuse-GCN (LAST-Lite)
#
# v5 — bug fixes + de-regularization:
#   - Removed block_dropout (DropPath is sufficient)
#   - Disabled Mixup/CutMix: new components (TemporalAttn, AdaptiveCTRGCN, IB loss) need hard labels
#   - Reduced head dropout (nano 0.15→0.10, small 0.30→0.20)
#   - Removed EpSepTCN/MultiScaleTCN internal residuals (50% gradient to novel components, up from 33%)
#   - label_smoothing stays 0.0 (DropPath+Dropout provide sufficient regularization)
#   - Added IB loss support (ib_loss_weight)
#
# All values can be overridden at the command line:
#   --epochs 120 --set training.label_smoothing=0.05

training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0004          # v5: slightly reduced from 0.0005

  # Scheduler — cosine warmup for smooth decay
  scheduler: cosine_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.01
  min_lr: 0.0001

  # Duration
  epochs: 150              # v5: extended from 120 — temporal attention gate and AdaptiveCTRGCN
                           # Q/K convs need ~20-30 extra epochs to fully activate from their
                           # small-init values (sigmoid(-4)=0.018, alpha=0.1→tanh=0.10)
  batch_size: 64
  gradient_accumulation_steps: 1

  # Regularization
  label_smoothing: 0.0          # Mixup/CutMix already produce soft targets; LS compounds and over-smooths
  gradient_clip: 5.0

  # Mixup + Temporal CutMix — DISABLED for v5
  # Reasons:
  #   1. TemporalAttention gate (sigmoid(-4)=0.018) needs hard labels to get clean gradient signal
  #      in early epochs; mixed targets blur the learning signal for the novel Q/K/V weights
  #   2. IB prototype loss is based on hard class assignments — soft Mixup targets conflict
  #   3. AdaptiveCTRGCN per-sample topology benefits more from data diversity than label smoothing
  #   4. DropPath + head dropout already provide structural regularisation
  mixup_alpha: 0.0              # 0.0 = disabled
  cutmix_prob: 0.0              # 0.0 = disabled
  cutmix_alpha: 1.0             # unused; kept for CLI compatibility

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5           # v6: finer granularity → last-5 average covers ep130-150 window

  # Reproducibility
  seed: 42

  # IB loss weight (v5: enable with ib_loss_weight > 0 when model returns aux_loss)
  ib_loss_weight: 0.01
