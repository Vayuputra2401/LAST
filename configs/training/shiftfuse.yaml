# Training config for ShiftFuse-GCN (LAST-Lite)
#
# v7 — 4-stream late fusion + spatial-first blocks:
#   - batch_size: 64 → 16, gradient_accumulation_steps: 1 → 4
#     (backbone sees 4 streams × 16 = 64 samples per stacked-batch call → same GPU memory)
#   - epochs: 150 → 180 (extra blocks + new components need more time to activate)
#   - Mixup re-enabled: alpha=0.1 (v5 proved 83.33% > v6 no-Mixup 83.02% — light Mixup confirmed better)
#   - IB loss continues at weight=0.01 (stable across v5-v6)
#   - label_smoothing stays 0.0 (DropPath+Dropout+Mixup provide sufficient regularization)
#
# All values can be overridden at the command line:
#   --epochs 180 --set training.label_smoothing=0.05

training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0004          # v5: slightly reduced from 0.0005

  # Scheduler — cosine warmup for smooth decay
  scheduler: cosine_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.01
  min_lr: 0.0001

  # Duration
  epochs: 180              # v7: extended from 150 — extra blocks ([1,3,3] vs [1,2,2]) and
                           # late-fusion heads need more time to specialise
  batch_size: 16           # v7: 64→16; backbone stacks 4 streams → 4×16=64 effective samples
                           # per call → same GPU memory as old batch=64
  gradient_accumulation_steps: 4  # effective batch = 16 × 4 = 64 (unchanged)

  # Regularization
  label_smoothing: 0.0          # Mixup/CutMix already produce soft targets; LS compounds and over-smooths
  gradient_clip: 5.0

  # Mixup — RE-ENABLED for v7
  # v5 (Mixup 0.1): 83.33% > v6 (no Mixup): 83.02%  (+0.31pp confirmed)
  # Light Mixup acts as a soft label regularizer that complements DropPath+Dropout.
  # IB prototype loss is computed on clean hard-label batches BEFORE Mixup blending,
  # so there is no conflict between IB and soft targets.
  mixup_alpha: 0.1              # Light Mixup — confirmed +0.31pp vs disabled
  cutmix_prob: 0.0              # CutMix disabled (Mixup alone is better at this scale)
  cutmix_alpha: 1.0             # unused; kept for CLI compatibility

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5           # v6: finer granularity → last-5 average covers ep130-150 window

  # Reproducibility
  seed: 42

  # IB loss weight (v7: 0.01→0.001; InfoGCN ref=0.0001; 0.01 was 5-10% CE gradient → too strong)
  ib_loss_weight: 0.001
