# Training config for ShiftFuse-GCN (LAST-Lite)
#
# Round 4 — plateau breaker: CTRLightGCN + DropPath + Mixup/CutMix + cosine schedule
#   Previous (Round 3): multistep_warmup, LS=0.05, no augmentation → 81% wall
#   Changes:
#     - cosine_warmup replaces multistep (smoother decay, no sharp re-memorization)
#     - label_smoothing 0.1 (was 0.05)
#     - mixup_alpha 0.2 + cutmix_prob 0.5 (first augmentation for LAST-Lite)
#     - DropPath + block_dropout now in model config (no trainer change needed)
#
# All values can be overridden at the command line:
#   --epochs 120 --set training.label_smoothing=0.05

training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005

  # Scheduler — cosine warmup for smooth decay (replaces multistep)
  scheduler: cosine_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.01
  min_lr: 0.0001

  # Duration
  epochs: 120
  batch_size: 64
  gradient_accumulation_steps: 1

  # Regularization
  label_smoothing: 0.1        # Round 4: tightened from 0.05
  gradient_clip: 5.0

  # Mixup + Temporal CutMix
  # Mixed targets are soft float one-hot blends (compatible with label_smoothing)
  mixup_alpha: 0.2            # Beta(alpha, alpha) lambda; 0.0 = disabled
  cutmix_prob: 0.5            # prob of CutMix vs Mixup per batch; 0.0 = disabled
  cutmix_alpha: 1.0           # Beta(alpha, alpha) for CutMix lambda

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 10

  # Reproducibility
  seed: 42

  # IB loss (ShiftFuse has no information bottleneck loss)
  ib_loss_weight: 0.0
