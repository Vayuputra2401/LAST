# Training config for ShiftFuse-GCN (LAST-Lite)
#
# Round 3 — corrected regularization after nano (79.75%) beat small (78.84%):
#   - 120 epochs, milestones [60, 90]
#   - Label smoothing 0.05 (was 0.1 — too aggressive)
#   - Weight decay 0.0005 (was 0.001 — over-regularized small)
#   - 5-epoch warmup for gate stability
#
# All values can be overridden at the command line:
#   --epochs 90 --milestones 50,65 --set training.label_smoothing=0.05

training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005

  # Scheduler (MultiStep mirrors EfficientGCN exactly)
  scheduler: multistep_warmup
  warmup_epochs: 5
  warmup_start_lr: 0.01
  milestones: [60, 90]   # drops at 50% and 75% of 120 epochs
  gamma: 0.1
  min_lr: 0.0001         # floor for cosine_warmup (unused by multistep_warmup)

  # Duration
  epochs: 120
  batch_size: 64
  gradient_accumulation_steps: 1

  # Regularization
  # 0.05 balances regularization without strangling small model's extra capacity
  label_smoothing: 0.05
  # ShiftFuse has no adaptive/dynamic modules — BN keeps grads bounded without clip
  gradient_clip: 5.0

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 10

  # Reproducibility
  seed: 42

  # IB loss (ShiftFuse has no information bottleneck loss)
  ib_loss_weight: 0.0
