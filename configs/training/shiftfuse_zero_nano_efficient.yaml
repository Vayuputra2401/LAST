training:
  # Optimizer
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0001  # EfficientGCN-exact (was 0.0004 — 4× over-regularised)

  # Scheduler
  scheduler: cosine_warmup
  warmup_epochs: 10
  warmup_start_lr: 0.005
  min_lr: 0.0001

  # Duration — 400ep: STC residual gate fix removes ~80ep dead zone; remaining
  # complexity (DS-TCN DW sparsity + K=3 W_k + per-block A_k_learned) adds ~40ep vs nano
  epochs: 400
  batch_size: 64
  gradient_accumulation_steps: 1

  # Regularization — label_smoothing dropped (redundant with Mixup+CutMix)
  label_smoothing: 0.0
  gradient_clip: 1.0

  # Augmentation — mixup=0.1 validated on nano; DS-TCN may benefit from slightly more
  mixup_alpha: 0.1
  cutmix_prob: 0.0
  cutmix_alpha: 1.0

  # Input
  input_frames: 64

  # Precision
  use_amp: true
  use_compile: false

  # DataLoader
  num_workers: 4
  pin_memory: true

  # Logging
  log_interval: 20
  eval_interval: 1
  save_interval: 5

  # Reproducibility
  seed: 42

  # IB loss — disabled
  ib_loss_weight: 0.0

  # TTA: spatial flip (original + mirrored → average logits) — enable for final eval
  tta_flip: false

  # Knowledge distillation — disabled by default
  use_kd: false
  teacher_checkpoint: ""
  teacher_variant: "large"
  teacher_num_classes: 60
  kd_weight: 0.5
  kd_temperature: 4.0
