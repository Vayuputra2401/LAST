# ShiftFuse-GCN Nano model configuration
# Edge-deployable, INT8-quantisable.
# Round 4: CTRLightGCN (G=2), DropPath (max 0.10), block_dropout 0.05
model:
  name: shiftfuse_nano
  variant: nano
  # num_classes is intentionally absent — always read from configs/data/*.yaml at runtime
  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: spatial
  T: 64
  num_joints: 25
  stem_channels: 24
  channels: [32, 48, 64]
  num_blocks: [1, 1, 1]
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 1
  use_dct_gate: true
  use_joint_embed: true
  use_frame_gate: false         # Disabled: redundant with FrozenDCTGate
  use_bilateral: true
  use_multiscale_tcn: false     # EpSepTCN(k=5) for nano param budget
  num_gcn_groups: 2             # CTRLightGCN groups (nano budget)
  drop_path_rate: 0.10          # max stochastic depth rate (linear schedule)
  block_dropout: 0.05           # backbone intermediate dropout
  dropout: 0.15                 # classifier head dropout (was 0.1)
