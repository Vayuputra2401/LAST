# ShiftFuse-V10 Small — model configuration
#
# Architecture: SGP + DW-GCN + TLA + 4-stream fusion
#
# Params:  ~450–600K
# Target:  90–92% NTU-60 xsub (beat EfficientGCN-B0 @ 290K, approach B4 @ 1.1M)
# Use case: primary accuracy target, comparable param class

model:
  name: shiftfuse_v10_small
  variant: small

  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: semantic_bodypart
  T: 64
  num_joints: 25

  # Architecture
  stem_channels: 32
  channels: [64, 128, 256]         # 1:2:4 ratio
  num_blocks: [2, 3, 4]            # 9 blocks
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 2
  drop_path_rate: 0.20

  # TLA
  tla_landmarks: 8
  tla_reduce: 8

  # Regularisation
  dropout: 0.20
