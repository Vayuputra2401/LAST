# ShiftFuse-V10 Nano — model configuration (V10.2)
#
# Architecture: SGP (semantic body-part graph, K=3 intra/inter/cross)
#               + Group Conv GCN (G=4, cross-channel mixing)
#               + TLA (temporal landmark attention, K=8)
#               + 4-stream late fusion
#
# NOTE: num_blocks and all architecture settings below are INFORMATIONAL ONLY.
#       The model reads these from V10_VARIANTS in shiftfuse_v10.py, not from this YAML.
#
# Params:  ~201K (verified by dry run)
# Target:  84–87% NTU-60 xsub baseline; 88–90% with KD from large teacher
# V10.2 nano-specific: share_gcn=True, share_je=True, single_head=True, use_stream_bn=False

model:
  name: shiftfuse_v10_nano
  variant: nano

  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: semantic_bodypart
  T: 64
  num_joints: 25

  # Architecture (informational — actual values live in V10_VARIANTS['nano'])
  stem_channels: 24
  channels: [32, 64, 128]          # 1:2:4 ratio
  num_blocks: [2, 3, 2]            # 7 blocks total (V10.2)
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 2                       # 2-hop enables cross-body edges in A_cross
  drop_path_rate: 0.10

  # TLA
  tla_landmarks: 14
  tla_reduce: 8                    # d_k = C // 8

  # Regularisation
  dropout: 0.10
