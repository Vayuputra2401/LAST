# ShiftFuse-Experimental Nano — model configuration
#
# Ultra-lightweight variant of the experimental arch. Target: <100K parameters.
# Based on experimental (Option 3) architecture — no TemporalAttention.
#
# Params:  <100K
# Target:  ~85–87% NTU-60 xsub (same ballpark as v5/v6 at 289K, fewer params)
# Use case: edge deployment, ablation baseline for BRASP/JE contribution

model:
  name: shiftfuse_experimental_nano
  variant: nano

  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: spatial
  T: 64
  num_joints: 25

  # Architecture — narrow channels for <100K budget
  stem_channels: 16
  channels: [24, 48, 96]        # 1:2:4 ratio, scaled down from small
  num_blocks: [1, 1, 1]
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 1                    # 1-hop graph (reduces GCN K=3 aggregation reach)
  num_gcn_groups: 4
  drop_path_rate: 0.05          # lighter stochastic depth (only 3 blocks)

  # Temporal shift offsets (MultiScaleTSM)
  tsm_shift_s: 2
  tsm_shift_l: 4

  # Regularisation
  dropout: 0.10                 # lighter dropout for smaller model
