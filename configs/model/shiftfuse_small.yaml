# ShiftFuse-GCN Small model configuration
# Primary edge target: beats EfficientGCN-B0 (90.2% @ 290K) with 3× fewer params.
# Round 4: CTRLightGCN (G=4), DropPath (max 0.15), MultiScaleEpSepTCN, block_dropout 0.10
model:
  name: shiftfuse_small
  variant: small
  # num_classes is intentionally absent — always read from configs/data/*.yaml at runtime
  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: spatial
  T: 64
  num_joints: 25
  stem_channels: 32
  channels: [48, 72, 96]
  num_blocks: [1, 2, 2]
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 2
  use_dct_gate: true
  use_joint_embed: true
  use_frame_gate: false         # Disabled: redundant with FrozenDCTGate
  use_bilateral: true
  use_multiscale_tcn: true      # k=3/k=5/MaxPool branches for small
  num_tcn_branches: 3
  num_gcn_groups: 4             # CTRLightGCN groups (full refinement)
  drop_path_rate: 0.15          # max stochastic depth rate (linear schedule)
  block_dropout: 0.10           # backbone intermediate dropout
  dropout: 0.30                 # classifier head dropout (was 0.2)
