# ShiftFuse-Experimental Small — model configuration
#
# Option 3 lean variant: TemporalAttention replaced by zero-param MultiScaleTSM.
# All other novel components from v9 preserved.
#
# Params:  ~826K
# Target:  90–91% NTU-60 xsub (between EfficientGCN-B0 90.2% and B4 92.1%)

model:
  name: shiftfuse_experimental
  variant: small

  in_channels: 3
  graph_layout: ntu-rgb+d
  graph_strategy: spatial
  T: 64
  num_joints: 25

  # Architecture
  stem_channels: 32
  channels: [64, 128, 256]       # 1:2:4 ratio — same as v9 small
  num_blocks: [1, 2, 3]
  strides: [1, 2, 2]
  expand_ratio: 2
  max_hop: 2
  num_gcn_groups: 4
  drop_path_rate: 0.15

  # Temporal shift offsets (MultiScaleTSM)
  tsm_shift_s: 2                 # short-range: ±2 frames
  tsm_shift_l: 4                 # long-range:  ±4 frames

  # Regularisation
  dropout: 0.20

  # Components active/removed vs v9
  # ✓ BRASP, JointEmbed-before-GCN, AdaptiveGCN, SE, 4-branch TCN, IB loss
  # ✗ TemporalAttention (replaced by MultiScaleTSM above)
