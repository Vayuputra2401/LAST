# Lambda AI Environment — NVIDIA A100 SXM4 (80GB) Instance
# Run from: ~/LAST/
# Data at:  /lambda/nfs/research-last/LAST-60/data/processed/xsub
# GCS src:  gs://research-last/LAST-60/data/processed/xsub

environment:
  name: "lambda"
  type: "cloud"

paths:
  # train.py builds: {data_base}/LAST-60/data/processed/{split_type}/
  data_base:    "/lambda/nfs/research-last/"
  data_root:    "/lambda/nfs/research-last/LAST-60/data/processed/xsub"
  output_root:  "/lambda/nfs/research-last/LAST-runs"
  checkpoints:  "/lambda/nfs/research-last/LAST-runs/checkpoints"
  logs:         "/lambda/nfs/research-last/LAST-runs/logs"

hardware:
  device:          "cuda"
  num_workers:     16       # A100 SXM4 instances have 48+ cores; 16 keeps GPU fed
  pin_memory:      true
  prefetch_factor: 4
  amp_dtype:       "bfloat16"  # A100 native bf16 tensor cores

lambda_ai:
  gpu:       "nvidia-a100-sxm4"
  memory_gb: 80
  cpu_cores: 48
  ram_gb:    400
